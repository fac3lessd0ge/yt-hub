name: CD

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify CI passed for this commit
        run: |
          COMMIT_SHA=$(git rev-list -1 ${{ github.ref }})
          echo "Checking CI status for commit $COMMIT_SHA"

          for i in $(seq 1 30); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/status --jq '.state' 2>/dev/null || echo "pending")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "CI passed"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "CI failed — aborting CD"
              exit 1
            fi
            sleep 10
          done
          echo "CI status not found after 5 minutes — aborting CD"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-yt-api:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build and push yt-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-api/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-api
          cache-to: type=gha,mode=max,scope=yt-api
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:latest

  build-and-push-yt-service:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build and push yt-service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-service/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-service
          cache-to: type=gha,mode=max,scope=yt-service
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:latest
