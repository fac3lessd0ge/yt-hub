name: CD

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or rollback"
        required: true
        default: deploy
        type: choice
        options: [deploy, rollback]
      version_tag:
        description: "Version tag (e.g. v1.2.3)"
        required: true
        type: string
      target_vm:
        description: "Deployment target"
        required: true
        default: both
        type: choice
        options: [vm1, vm2, both]

env:
  REGISTRY: ghcr.io

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      deploy_mode: ${{ steps.vars.outputs.deploy_mode }}
      deploy_target: ${{ steps.vars.outputs.deploy_target }}
    steps:
      - name: Resolve action variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=deploy" >> "$GITHUB_OUTPUT"
            echo "deploy_target=both" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
            echo "deploy_target=${{ inputs.target_vm }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Print deployment intent
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "version=${{ steps.vars.outputs.version }}"
          echo "deploy_mode=${{ steps.vars.outputs.deploy_mode }}"
          echo "deploy_target=${{ steps.vars.outputs.deploy_target }}"
      - name: Validate version tag (semver)
        env:
          VERSION_TAG: ${{ steps.vars.outputs.version }}
        run: |
          if ! echo "$VERSION_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version tag: '$VERSION_TAG' (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
      - name: Validate required secrets and vars
        env:
          VM1_SSH_HOST: ${{ secrets.VM1_SSH_HOST }}
          VM1_SSH_PORT: ${{ secrets.VM1_SSH_PORT }}
          VM1_SSH_USER: ${{ secrets.VM1_SSH_USER }}
          VM1_SSH_PRIVATE_KEY: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          VM1_DEPLOY_PATH: ${{ secrets.VM1_DEPLOY_PATH }}
          VM2_SSH_HOST: ${{ secrets.VM2_SSH_HOST }}
          VM2_SSH_PORT: ${{ secrets.VM2_SSH_PORT }}
          VM2_SSH_USER: ${{ secrets.VM2_SSH_USER }}
          VM2_SSH_PRIVATE_KEY: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
          VM2_DEPLOY_PATH: ${{ secrets.VM2_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          for key in \
            VM1_SSH_HOST VM1_SSH_PORT VM1_SSH_USER VM1_SSH_PRIVATE_KEY VM1_DEPLOY_PATH \
            VM2_SSH_HOST VM2_SSH_PORT VM2_SSH_USER VM2_SSH_PRIVATE_KEY VM2_DEPLOY_PATH \
            GHCR_USERNAME GHCR_PAT
          do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done
      - name: Verify SSH ports reachable (TCP)
        env:
          VM1_SSH_HOST: ${{ secrets.VM1_SSH_HOST }}
          VM1_SSH_PORT: ${{ secrets.VM1_SSH_PORT }}
          VM2_SSH_HOST: ${{ secrets.VM2_SSH_HOST }}
          VM2_SSH_PORT: ${{ secrets.VM2_SSH_PORT }}
        run: |
          set -e
          probe() {
            echo "Probing TCP $1:$2 ..."
            nc -z -w 5 "$1" "$2"
          }
          probe "$VM1_SSH_HOST" "$VM1_SSH_PORT"
          probe "$VM2_SSH_HOST" "$VM2_SSH_PORT"

  verify-ci:
    needs: preflight
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify CI passed for this commit
        run: |
          MERGE_SHA=$(git rev-list -1 ${{ github.ref }})
          echo "Tag points to merge commit: $MERGE_SHA"

          # For merge commits, CI ran on the PR head (second parent), not on
          # the merge commit itself. Check the PR head's check runs first,
          # then fall back to the merge commit if it's not a merge.
          PR_HEAD=$(git rev-parse ${MERGE_SHA}^2 2>/dev/null || echo "")

          if [ -n "$PR_HEAD" ]; then
            CHECK_SHA=$PR_HEAD
            echo "Merge commit detected — checking PR head: $CHECK_SHA"
          else
            CHECK_SHA=$MERGE_SHA
            echo "Not a merge commit — checking directly: $CHECK_SHA"
          fi

          for i in $(seq 1 30); do
            CI_RESULT=$(gh api repos/${{ github.repository }}/commits/$CHECK_SHA/check-runs \
              --jq '[.check_runs[] | select(.name == "ci")] | if length == 0 then "not_found" elif .[0].status != "completed" then "pending" else .[0].conclusion end' \
              2>/dev/null || echo "pending")
            echo "Attempt $i: ci=$CI_RESULT"
            if [ "$CI_RESULT" = "success" ]; then
              echo "CI passed on $CHECK_SHA"
              exit 0
            elif [ "$CI_RESULT" = "failure" ] || [ "$CI_RESULT" = "cancelled" ]; then
              echo "CI failed — aborting CD"
              exit 1
            fi
            sleep 10
          done
          echo "CI check not found after 5 minutes — aborting CD"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-yt-api:
    needs: [preflight, verify-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push yt-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-api/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-api
          cache-to: type=gha,mode=max,scope=yt-api
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:${{ needs.preflight.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:latest

  build-and-push-yt-service:
    needs: [preflight, verify-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push yt-service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-service/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-service
          cache-to: type=gha,mode=max,scope=yt-service
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:${{ needs.preflight.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:latest

  deploy-vm2:
    needs: [preflight, build-and-push-yt-api, build-and-push-yt-service]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.deploy_mode == 'deploy' &&
      (needs.preflight.outputs.deploy_target == 'both' || needs.preflight.outputs.deploy_target == 'vm2') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.build-and-push-yt-api.result == 'success' &&
          needs.build-and-push-yt-service.result == 'success'
        )
      )
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm2.yml
      script_body: VERSION="${{ needs.preflight.outputs.version }}" ./scripts/deploy-vm2.sh
    secrets:
      ssh_host: ${{ secrets.VM2_SSH_HOST }}
      ssh_port: ${{ secrets.VM2_SSH_PORT }}
      ssh_user: ${{ secrets.VM2_SSH_USER }}
      deploy_path: ${{ secrets.VM2_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}

  deploy-vm1-after-vm2:
    needs: [preflight, deploy-vm2]
    if: needs.preflight.outputs.deploy_mode == 'deploy' && needs.preflight.outputs.deploy_target == 'both'
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm1.yml
      script_body: VERSION="${{ needs.preflight.outputs.version }}" ./scripts/deploy-vm1.sh
    secrets:
      ssh_host: ${{ secrets.VM1_SSH_HOST }}
      ssh_port: ${{ secrets.VM1_SSH_PORT }}
      ssh_user: ${{ secrets.VM1_SSH_USER }}
      deploy_path: ${{ secrets.VM1_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}

  deploy-vm1-direct:
    needs: [preflight, build-and-push-yt-api, build-and-push-yt-service]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.deploy_mode == 'deploy' &&
      needs.preflight.outputs.deploy_target == 'vm1' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.build-and-push-yt-api.result == 'success' &&
          needs.build-and-push-yt-service.result == 'success'
        )
      )
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm1.yml
      script_body: VERSION="${{ needs.preflight.outputs.version }}" ./scripts/deploy-vm1.sh
    secrets:
      ssh_host: ${{ secrets.VM1_SSH_HOST }}
      ssh_port: ${{ secrets.VM1_SSH_PORT }}
      ssh_user: ${{ secrets.VM1_SSH_USER }}
      deploy_path: ${{ secrets.VM1_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}

  rollback-vm2:
    needs: preflight
    if: needs.preflight.outputs.deploy_mode == 'rollback' && (needs.preflight.outputs.deploy_target == 'both' || needs.preflight.outputs.deploy_target == 'vm2')
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm2.yml
      script_body: ./scripts/rollback-vm2.sh "${{ needs.preflight.outputs.version }}"
    secrets:
      ssh_host: ${{ secrets.VM2_SSH_HOST }}
      ssh_port: ${{ secrets.VM2_SSH_PORT }}
      ssh_user: ${{ secrets.VM2_SSH_USER }}
      deploy_path: ${{ secrets.VM2_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}

  rollback-vm1-after-vm2:
    needs: [preflight, rollback-vm2]
    if: needs.preflight.outputs.deploy_mode == 'rollback' && needs.preflight.outputs.deploy_target == 'both'
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm1.yml
      script_body: ./scripts/rollback-vm1.sh "${{ needs.preflight.outputs.version }}"
    secrets:
      ssh_host: ${{ secrets.VM1_SSH_HOST }}
      ssh_port: ${{ secrets.VM1_SSH_PORT }}
      ssh_user: ${{ secrets.VM1_SSH_USER }}
      deploy_path: ${{ secrets.VM1_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}

  rollback-vm1-direct:
    needs: preflight
    if: needs.preflight.outputs.deploy_mode == 'rollback' && needs.preflight.outputs.deploy_target == 'vm1'
    uses: ./.github/workflows/reusable-ssh-exec.yml
    with:
      deploy_timeout_seconds: ${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}
      compose_file: docker-compose.prod.vm1.yml
      script_body: ./scripts/rollback-vm1.sh "${{ needs.preflight.outputs.version }}"
    secrets:
      ssh_host: ${{ secrets.VM1_SSH_HOST }}
      ssh_port: ${{ secrets.VM1_SSH_PORT }}
      ssh_user: ${{ secrets.VM1_SSH_USER }}
      deploy_path: ${{ secrets.VM1_DEPLOY_PATH }}
      ssh_private_key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
      ghcr_username: ${{ secrets.GHCR_USERNAME }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}
