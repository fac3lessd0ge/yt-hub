name: CD

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify CI passed for this commit
        run: |
          MERGE_SHA=$(git rev-list -1 ${{ github.ref }})
          echo "Tag points to merge commit: $MERGE_SHA"

          # For merge commits, CI ran on the PR head (second parent), not on
          # the merge commit itself. Check the PR head's check runs first,
          # then fall back to the merge commit if it's not a merge.
          PR_HEAD=$(git rev-parse ${MERGE_SHA}^2 2>/dev/null || echo "")

          if [ -n "$PR_HEAD" ]; then
            CHECK_SHA=$PR_HEAD
            echo "Merge commit detected — checking PR head: $CHECK_SHA"
          else
            CHECK_SHA=$MERGE_SHA
            echo "Not a merge commit — checking directly: $CHECK_SHA"
          fi

          for i in $(seq 1 30); do
            CI_RESULT=$(gh api repos/${{ github.repository }}/commits/$CHECK_SHA/check-runs \
              --jq '[.check_runs[] | select(.name == "ci")] | if length == 0 then "not_found" elif .[0].status != "completed" then "pending" else .[0].conclusion end' \
              2>/dev/null || echo "pending")
            echo "Attempt $i: ci=$CI_RESULT"
            if [ "$CI_RESULT" = "success" ]; then
              echo "CI passed on $CHECK_SHA"
              exit 0
            elif [ "$CI_RESULT" = "failure" ] || [ "$CI_RESULT" = "cancelled" ]; then
              echo "CI failed — aborting CD"
              exit 1
            fi
            sleep 10
          done
          echo "CI check not found after 5 minutes — aborting CD"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-yt-api:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build and push yt-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-api/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-api
          cache-to: type=gha,mode=max,scope=yt-api
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:latest

  build-and-push-yt-service:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build and push yt-service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-service/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-service
          cache-to: type=gha,mode=max,scope=yt-service
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:latest
