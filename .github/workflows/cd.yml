name: CD

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or rollback"
        required: true
        default: deploy
        type: choice
        options: [deploy, rollback]
      version_tag:
        description: "Version tag (e.g. v1.2.3)"
        required: true
        type: string
      target_vm:
        description: "Deployment target"
        required: true
        default: both
        type: choice
        options: [vm1, vm2, both]

env:
  REGISTRY: ghcr.io

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      deploy_action: ${{ steps.vars.outputs.deploy_action }}
      target_vm: ${{ steps.vars.outputs.target_vm }}
    steps:
      - name: Resolve action variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "deploy_action=deploy" >> "$GITHUB_OUTPUT"
            echo "target_vm=both" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
            echo "deploy_action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
            echo "target_vm=${{ inputs.target_vm }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate required secrets and vars
        env:
          VM1_SSH_HOST: ${{ secrets.VM1_SSH_HOST }}
          VM1_SSH_PORT: ${{ secrets.VM1_SSH_PORT }}
          VM1_SSH_USER: ${{ secrets.VM1_SSH_USER }}
          VM1_SSH_PRIVATE_KEY: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          VM1_DEPLOY_PATH: ${{ secrets.VM1_DEPLOY_PATH }}
          VM2_SSH_HOST: ${{ secrets.VM2_SSH_HOST }}
          VM2_SSH_PORT: ${{ secrets.VM2_SSH_PORT }}
          VM2_SSH_USER: ${{ secrets.VM2_SSH_USER }}
          VM2_SSH_PRIVATE_KEY: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
          VM2_DEPLOY_PATH: ${{ secrets.VM2_DEPLOY_PATH }}
        run: |
          for key in \
            VM1_SSH_HOST VM1_SSH_PORT VM1_SSH_USER VM1_SSH_PRIVATE_KEY VM1_DEPLOY_PATH \
            VM2_SSH_HOST VM2_SSH_PORT VM2_SSH_USER VM2_SSH_PRIVATE_KEY VM2_DEPLOY_PATH
          do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

  verify-ci:
    needs: preflight
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify CI passed for this commit
        run: |
          MERGE_SHA=$(git rev-list -1 ${{ github.ref }})
          echo "Tag points to merge commit: $MERGE_SHA"

          # For merge commits, CI ran on the PR head (second parent), not on
          # the merge commit itself. Check the PR head's check runs first,
          # then fall back to the merge commit if it's not a merge.
          PR_HEAD=$(git rev-parse ${MERGE_SHA}^2 2>/dev/null || echo "")

          if [ -n "$PR_HEAD" ]; then
            CHECK_SHA=$PR_HEAD
            echo "Merge commit detected — checking PR head: $CHECK_SHA"
          else
            CHECK_SHA=$MERGE_SHA
            echo "Not a merge commit — checking directly: $CHECK_SHA"
          fi

          for i in $(seq 1 30); do
            CI_RESULT=$(gh api repos/${{ github.repository }}/commits/$CHECK_SHA/check-runs \
              --jq '[.check_runs[] | select(.name == "ci")] | if length == 0 then "not_found" elif .[0].status != "completed" then "pending" else .[0].conclusion end' \
              2>/dev/null || echo "pending")
            echo "Attempt $i: ci=$CI_RESULT"
            if [ "$CI_RESULT" = "success" ]; then
              echo "CI passed on $CHECK_SHA"
              exit 0
            elif [ "$CI_RESULT" = "failure" ] || [ "$CI_RESULT" = "cancelled" ]; then
              echo "CI failed — aborting CD"
              exit 1
            fi
            sleep 10
          done
          echo "CI check not found after 5 minutes — aborting CD"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-yt-api:
    needs: [preflight, verify-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push yt-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-api/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-api
          cache-to: type=gha,mode=max,scope=yt-api
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:${{ needs.preflight.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-api:latest

  build-and-push-yt-service:
    needs: [preflight, verify-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push yt-service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/yt-service/Dockerfile
          push: true
          cache-from: type=gha,scope=yt-service
          cache-to: type=gha,mode=max,scope=yt-service
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:${{ needs.preflight.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/yt-service:latest

  deploy-vm2:
    needs: [preflight, build-and-push-yt-api, build-and-push-yt-service]
    if: needs.preflight.outputs.deploy_action == 'deploy' && (needs.preflight.outputs.target_vm == 'both' || needs.preflight.outputs.target_vm == 'vm2')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy VM2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM2_SSH_HOST }}
          username: ${{ secrets.VM2_SSH_USER }}
          key: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM2_SSH_PORT }}
          script: |
            cd "${{ secrets.VM2_DEPLOY_PATH }}"
            VERSION="${{ needs.preflight.outputs.version }}" DEPLOY_TIMEOUT_SECONDS="${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}" ./scripts/deploy-vm2.sh

  deploy-vm1-after-vm2:
    needs: [preflight, deploy-vm2]
    if: needs.preflight.outputs.deploy_action == 'deploy' && needs.preflight.outputs.target_vm == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy VM1
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM1_SSH_HOST }}
          username: ${{ secrets.VM1_SSH_USER }}
          key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM1_SSH_PORT }}
          script: |
            cd "${{ secrets.VM1_DEPLOY_PATH }}"
            VERSION="${{ needs.preflight.outputs.version }}" DEPLOY_TIMEOUT_SECONDS="${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}" ./scripts/deploy-vm1.sh

  deploy-vm1-direct:
    needs: [preflight, build-and-push-yt-api, build-and-push-yt-service]
    if: needs.preflight.outputs.deploy_action == 'deploy' && needs.preflight.outputs.target_vm == 'vm1'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy VM1
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM1_SSH_HOST }}
          username: ${{ secrets.VM1_SSH_USER }}
          key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM1_SSH_PORT }}
          script: |
            cd "${{ secrets.VM1_DEPLOY_PATH }}"
            VERSION="${{ needs.preflight.outputs.version }}" DEPLOY_TIMEOUT_SECONDS="${{ vars.DEPLOY_TIMEOUT_SECONDS || '120' }}" ./scripts/deploy-vm1.sh

  rollback-vm2:
    needs: preflight
    if: needs.preflight.outputs.deploy_action == 'rollback' && (needs.preflight.outputs.target_vm == 'both' || needs.preflight.outputs.target_vm == 'vm2')
    runs-on: ubuntu-latest
    steps:
      - name: Rollback VM2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM2_SSH_HOST }}
          username: ${{ secrets.VM2_SSH_USER }}
          key: ${{ secrets.VM2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM2_SSH_PORT }}
          script: |
            cd "${{ secrets.VM2_DEPLOY_PATH }}"
            ./scripts/rollback-vm2.sh "${{ needs.preflight.outputs.version }}"

  rollback-vm1-after-vm2:
    needs: [preflight, rollback-vm2]
    if: needs.preflight.outputs.deploy_action == 'rollback' && needs.preflight.outputs.target_vm == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Rollback VM1
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM1_SSH_HOST }}
          username: ${{ secrets.VM1_SSH_USER }}
          key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM1_SSH_PORT }}
          script: |
            cd "${{ secrets.VM1_DEPLOY_PATH }}"
            ./scripts/rollback-vm1.sh "${{ needs.preflight.outputs.version }}"

  rollback-vm1-direct:
    needs: preflight
    if: needs.preflight.outputs.deploy_action == 'rollback' && needs.preflight.outputs.target_vm == 'vm1'
    runs-on: ubuntu-latest
    steps:
      - name: Rollback VM1
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM1_SSH_HOST }}
          username: ${{ secrets.VM1_SSH_USER }}
          key: ${{ secrets.VM1_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM1_SSH_PORT }}
          script: |
            cd "${{ secrets.VM1_DEPLOY_PATH }}"
            ./scripts/rollback-vm1.sh "${{ needs.preflight.outputs.version }}"
