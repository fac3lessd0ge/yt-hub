name: Security Scanning

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    branches: [main, dev]
    paths:
      - 'package-lock.json'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (critical)
        run: npm audit --audit-level=critical
