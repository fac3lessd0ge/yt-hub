name: Release

# Build the desktop installers and publish them to a GitHub Release.
# Trigger: push a version tag, e.g.  git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build installers (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch bundled yt-dlp + ffmpeg (this platform)
        run: npm run binaries:fetch
      - name: Build yt-downloader (prerequisite)
        run: npx nx build yt-downloader
      - name: Make installers
        run: npx nx build yt-client
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            packages/yt-client/out/make/**/*.exe
            packages/yt-client/out/make/**/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release with the installers
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
          body: |
            ## YT Hub ${{ github.ref_name }}

            Desktop YouTube downloader — yt-dlp + ffmpeg are bundled, no setup required.

            ### Install
            - **Windows:** run the `.exe`. The installers are **unsigned**, so SmartScreen will warn — click **More info → Run anyway**.
            - **Linux:** unzip and run the `YT Hub` binary.

            macOS is not supported.
