# Reusable: run shell on a remote host over SSH (deploy / rollback).
name: Reusable SSH exec

on:
  workflow_call:
    inputs:
      ssh_host:
        required: true
        type: string
      ssh_port:
        required: true
        type: string
      ssh_user:
        required: true
        type: string
      deploy_path:
        required: true
        type: string
      script_body:
        required: true
        type: string
      deploy_timeout_seconds:
        type: string
        default: "120"
    secrets:
      ssh_private_key:
        required: true

jobs:
  ssh-exec:
    runs-on: ubuntu-latest
    steps:
      - name: Run remote command
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ inputs.ssh_host }}
          username: ${{ inputs.ssh_user }}
          key: ${{ secrets.ssh_private_key }}
          port: ${{ inputs.ssh_port }}
          script: |
            cd "${{ inputs.deploy_path }}"
            export DEPLOY_TIMEOUT_SECONDS="${{ inputs.deploy_timeout_seconds }}"
            ${{ inputs.script_body }}
