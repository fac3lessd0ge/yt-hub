services:
  yt-service:
    build:
      context: .
      dockerfile: packages/yt-service/Dockerfile
      args:
        YT_DLP_VERSION: ${YT_DLP_VERSION:-2026.03.17}
    ports:
      - "50051:50051"
    env_file:
      - path: .env
        required: false
    volumes:
      - downloads:/home/appuser/Downloads/yt-downloader
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=new net.Socket();s.connect(50051,'localhost',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  yt-api:
    build:
      context: .
      dockerfile: packages/yt-api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    depends_on:
      yt-service:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  downloads:
