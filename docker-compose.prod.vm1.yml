# VM1 production compose: reverse proxy + yt-api
# Usage: VERSION=v0.4.0 docker compose -f docker-compose.prod.vm1.yml --env-file .env.prod.vm1 up -d

services:
  traefik:
    # v3.3 pins Docker API 1.24 and breaks against modern Docker daemons (min API 1.40+). v3.6+ negotiates API version.
    image: traefik:v3.6
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    command:
      # Official image expects static config under /etc/traefik; mounting at /traefik.yml can
      # conflict with image layout and triggers "mount directory onto a file (or vice-versa)".
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      # traefik/traefik.yml defaults to network yt-hub_proxy; this stack uses yt-hub-vm1_proxy.
      - "--providers.docker.network=yt-hub-vm1_proxy"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme/acme.json
    networks:
      - proxy

  yt-api:
    image: ghcr.io/fac3lessd0ge/yt-api:${VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ${VM1_ENV_FILE:-.env.prod.vm1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health?deep=true"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
    stop_grace_period: 15s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=yt-hub-vm1_proxy"
      - "traefik.http.routers.yt-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.yt-api.entrypoints=websecure"
      - "traefik.http.routers.yt-api.tls=true"
      - "traefik.http.routers.yt-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.yt-api.loadbalancer.server.port=3000"

networks:
  proxy:
    name: yt-hub-vm1_proxy
