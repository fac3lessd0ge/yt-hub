# VM2 production compose: yt-service + downloads + internal HTTP
# Usage: VERSION=v0.4.0 docker compose -f docker-compose.prod.vm2.yml --env-file .env.prod.vm2 up -d

services:
  yt-service:
    image: ghcr.io/fac3lessd0ge/yt-service:${VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ${VM2_ENV_FILE:-.env.prod.vm2}
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/home/appuser/Downloads/yt-downloader
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=new net.Socket();s.connect(50051,'localhost',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    stop_grace_period: 10s
    ports:
      - "${VM2_GRPC_BIND:-50051}:50051"
      - "${VM2_INTERNAL_HTTP_BIND:-8081}:8081"
